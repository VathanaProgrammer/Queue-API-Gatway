<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vathana Real-Time Surveillance</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        .container { max-width: 600px; width: 100%; }
        h1 { color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 1rem; }
        .status { padding: 0.5rem 1rem; border-radius: 9999px; font-size: 0.8rem; background: #1e293b; margin-bottom: 2rem; border: 1px solid #334155; }
        .online { color: #4ade80; }
        .alert-card { background: #1e293b; border-left: 4px solid #f43f5e; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; animation: slideIn 0.3s ease-out; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .alert-title { font-weight: bold; color: #f43f5e; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .alert-body { font-size: 0.9rem; color: #94a3b8; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚨 Real-Time Surveillance</h1>
        <div class="status">System Status: <span class="online">● ONLINE (SSE)</span></div>
        <div id="alerts">
            <div class="alert-card" style="border-left-color: #38bdf8;">
                <div class="alert-title">ℹ️ System Ready</div>
                <div class="alert-body">Waiting for visitor alerts from API Gateway...</div>
            </div>
        </div>
    </div>

    <script>
        const alertContainer = document.getElementById('alerts');
        const eventSource = new EventSource('/api/queue/stream');

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const card = document.createElement('div');
            card.className = 'alert-card';
            card.innerHTML = `
                <div class="alert-title">🚨 ${data.title}</div>
                <div class="alert-body">${data.body}</div>
                <div style="font-size: 0.7rem; margin-top: 0.5rem; color: #64748b;">🔗 Path: ${data.path}</div>
            `;
            alertContainer.prepend(card);
            
            // Audio alert
            const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            audio.play().catch(e => console.log("Audio needs interaction"));
        };

        eventSource.onerror = (e) => {
            console.log("Connection lost, retrying...");
        };
    </script>
</body>
</html>
