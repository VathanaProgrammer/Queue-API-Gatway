name: Deploy API Gateway v2.0

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_NAME: Queue-API-Gatway
      SERVER_URL: 3.81.73.232:8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Capture Start Time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Build API Gateway
        run: mvn clean package -DskipTests

      - name: Copy Gateway to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "3.81.73.232"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar,Dockerfile"
          target: "~/app/API-Gatway"

      - name: SSH and Restart Gateway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "3.81.73.232"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app/API-Gatway

            sudo docker rm -f api-gateway || true

            PID=$(sudo lsof -t -i:8080 || true)
            if [ -n "$PID" ]; then
              sudo kill -9 $PID || true
            fi

            sleep 2

            if sudo lsof -i :8080; then
              echo "ERROR: Port still in use"
              exit 1
            fi

            sudo docker build -t api-gateway .

            sudo docker run -d \
              --name api-gateway \
              --restart unless-stopped \
              -p 8080:8080 \
              api-gateway

            sudo docker ps
            sudo docker logs --tail=80 api-gateway

      - name: Send Telegram Message
        if: always()
        run: |
          END_TIME=$(date +%s)
          TOTAL_SECONDS=$((END_TIME - START_TIME))
          MINUTES=$((TOTAL_SECONDS / 60))
          SECONDS=$((TOTAL_SECONDS % 60))

          TIME_NOW=$(TZ="Asia/Phnom_Penh" date +"%Y-%m-%d %I:%M %p")
          COMMIT_MESSAGE=$(git log -1 --pretty=%s)

          if [ "${{ job.status }}" = "success" ]; then
            TITLE="🚀 Auto-Deployment Successful!"
            STATUS_TEXT="✅ Status: Online and healthy."
          else
            TITLE="❌ Auto-Deployment Failed!"
            STATUS_TEXT="⚠️ Status: Failed. Please check GitHub Actions logs."
          fi

          MESSAGE=$(cat <<EOF
          $TITLE

          📁 Project: $PROJECT_NAME
          🌐 Server: $SERVER_URL
          🌿 Branch: $GITHUB_REF_NAME
          👤 Author: $GITHUB_ACTOR
          📝 Commit: $COMMIT_MESSAGE
          ⏰ Time: $TIME_NOW
          ⏱️ Duration: ${MINUTES}m ${SECONDS}s

          $STATUS_TEXT
          EOF
          )

          echo "Sending Telegram message..."
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE"