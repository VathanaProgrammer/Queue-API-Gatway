name: Deploy API Gateway

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build API Gateway
        run: mvn clean package -DskipTests -f API-Gatway/pom.xml

      - name: Copy Gateway to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "3.81.73.232"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "API-Gatway/target/*.jar,API-Gatway/Dockerfile"
          target: "~/app"

      - name: SSH and Restart Gateway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "3.81.73.232"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            # Build the Gateway container on the Gateway server
            sudo docker build -t api-gateway ./API-Gatway
            sudo docker rm -f api-gateway || true
            # Run the gateway on port 8080
            sudo docker run -d --name api-gateway -p 8080:8080 api-gateway
