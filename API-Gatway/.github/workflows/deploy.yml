name: Deploy API Gateway v2.0

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build API Gateway
        run: mvn clean package -DskipTests

      - name: Copy Gateway to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "3.81.73.232"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar,Dockerfile"
          target: "~/app/API-Gatway"

      - name: SSH and Restart Gateway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "3.81.73.232"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/app/API-Gatway

            echo "Stopping old api-gateway container..."
            sudo docker rm -f api-gateway || true

            echo "Killing anything still using port 8080..."
            sudo fuser -k 8080/tcp || true
            sleep 2

            echo "Checking port 8080..."
            sudo lsof -i :8080 || true

            echo "Building new Docker image..."
            sudo docker build -t api-gateway .

            echo "Starting new api-gateway container..."
            sudo docker run -d \
              --name api-gateway \
              --restart unless-stopped \
              -p 8080:8080 \
              api-gateway

            echo "Running containers:"
            sudo docker ps

            echo "Gateway logs:"
            sudo docker logs --tail=80 api-gateway