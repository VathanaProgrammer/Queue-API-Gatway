name: Deploy API Gateway v2.0

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Capture Start Time
        id: start_time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Build API Gateway
        run: mvn clean package -DskipTests

      - name: Copy Gateway to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "3.81.73.232"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar,Dockerfile"
          target: "~/app/API-Gatway"

      - name: SSH and Restart Gateway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "3.81.73.232"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app/API-Gatway

            sudo docker rm -f api-gateway || true

            PID=$(sudo lsof -t -i:8080 || true)
            if [ -n "$PID" ]; then
              sudo kill -9 $PID || true
            fi

            sleep 2

            if sudo lsof -i :8080; then
              echo "ERROR: Port still in use"
              exit 1
            fi

            sudo docker build -t api-gateway .
            sudo docker run -d \
              --name api-gateway \
              --restart unless-stopped \
              -p 8080:8080 \
              api-gateway

      - name: Calculate Duration
        id: duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - $START_TIME))
          echo "DURATION=${DURATION}" >> $GITHUB_ENV

      - name: Send Telegram Message - Success
        if: success()
        run: |
          TIME_NOW=$(date +"%Y-%m-%d %I:%M %p")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚀 *Auto-Deployment Successful!*

              📁 *Project:* API-Gatway
              🌐 *Server:* 3.81.73.232:8080
              🌿 *Branch:* ${GITHUB_REF_NAME}
              👤 *Author:* ${GITHUB_ACTOR}
              📝 *Commit:* $(git log -1 --pretty=%s)
              ⏰ *Time:* ${TIME_NOW}
              ⏱️ *Duration:* ${DURATION}s

              ✅ *Status:* Online and healthy."

      - name: Send Telegram Message - Failed
        if: failure()
        run: |
          TIME_NOW=$(date +"%Y-%m-%d %I:%M %p")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Deployment Failed!*

            📁 *Project:* API-Gatway
            🌿 *Branch:* ${GITHUB_REF_NAME}
            👤 *Author:* ${GITHUB_ACTOR}
            📝 *Commit:* $(git log -1 --pretty=%s)
            ⏰ *Time:* ${TIME_NOW}

            ⚠️ Please check GitHub Actions logs."