name: Deploy Gateway and Eureka

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Services
        run: |
          mvn clean package -DskipTests -f Queue-Eureka-Server/pom.xml
          mvn clean package -DskipTests -f API-Gatway/pom.xml

      - name: Copy Files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "Queue-Eureka-Server/target/*.jar,Queue-Eureka-Server/Dockerfile,API-Gatway/target/*.jar,API-Gatway/Dockerfile,docker-compose.yml"
          target: "~/app"

      - name: SSH and Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            sudo docker compose down
            sudo docker compose up -d --build eureka-server api-gateway
